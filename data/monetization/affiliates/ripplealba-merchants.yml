priority_rules:
  - id: high_commission
    rule: "승인시 60000원 이상이면 고단가 후보로 분류한다."
  - id: high_approval
    rule: "전월승인율 80% 이상이면 승인 안정 후보로 분류한다."
  - id: high_apply
    rule: "전월신청률 5% 이상이면 수요 신호가 있는 후보로 분류한다."
  - id: no_rate
    rule: "산출불가 항목은 신규/저표본 후보로 보고 단가와 카테고리 적합성만 우선 평가한다."
  - id: sensitive_category
    rule: "대출/금융, 보험/상조, 개인회생/법률, 건강/다이어트는 과장 표현과 정책 리스크를 별도 검토한다."

