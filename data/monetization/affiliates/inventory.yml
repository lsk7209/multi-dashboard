# Affiliate operating inventory.
# Store metadata only. Never store passwords, API tokens, bank details, tax IDs, or private account files.
# Status examples: candidate, applied, approved, active, paused, rejected, terminated.

source_policy: metadata_only
last_manual_sync: "2026-07-03"
playbook:
  disclosure_template_ko: "이 글에는 제휴 링크가 포함될 수 있으며, 링크를 통한 구매 또는 가입 시 일정액의 수수료를 받을 수 있습니다."
  disclosure_template_en: "This content contains affiliate links. We may earn a commission when you buy or sign up through these links."
  default_rel: "sponsored nofollow"
  banner_slot_strategy:
    - slot: "article-mid-728x90"
      purpose: "Comparison/review articles after the first useful answer."
      fit: "Coupang, Amazon, eBay, Booking, SaaS trials"
    - slot: "sidebar-300x250"
      purpose: "Evergreen tools and marketplace offers on desktop."
      fit: "SaaS, affiliate networks, shopping category offers"
    - slot: "after-content-728x90"
      purpose: "Decision-stage CTA after the article has answered intent."
      fit: "High-intent product, travel, software, finance-safe lead offers"
    - slot: "mobile-inline-320x100"
      purpose: "Low-height mobile placement for strong single offer."
      fit: "Coupang, Naver Shopping Connect, Amazon, Grammarly"
  priority_rules:
    - id: p0
      rule: "Start with programs that match broad site inventory, allow links/banners, and have clear public onboarding."
    - id: p1
      rule: "Use selective networks after site category pages, disclosure, and traffic proof are ready."
    - id: manual
      rule: "Do not deploy until commission, approval status, and promotional restrictions are verified inside the account."

