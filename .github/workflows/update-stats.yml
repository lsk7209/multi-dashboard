name: Update dashboard stats

on:
  schedule:
    - cron: "20 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-dashboard-stats
  cancel-in-progress: false

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update GA4 and GSC snapshot
        run: pnpm stats:update

      - name: Validate app
        run: |
          pnpm type-check
          pnpm lint
          pnpm build

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- data/site-stats.json; then
            echo "No stats changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/site-stats.json
          git commit -m "Update dashboard stats"
          git push
