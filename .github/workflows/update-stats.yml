name: Update dashboard stats

on:
  schedule:
    # 주 2회(월·목). 빌드 비용 절감: GA4/GSC 스냅샷 git push(=Vercel 빌드)를 매일→주2회로 축소.
    # GA4/GSC는 누적 데이터라 수집 주기를 늘려도 history에 일별 값이 보존됨. 즉시 갱신은 수동 실행(dispatch).
    - cron: "20 18 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-dashboard-stats
  cancel-in-progress: false

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import GA4 web streams
        run: pnpm setup:import-ga4-sites

      - name: Update GA4 and GSC snapshot
        run: pnpm stats:update

      - name: Validate app
        run: |
          pnpm type-check
          pnpm lint
          pnpm build

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- scripts/setup/sites.yaml data/site-stats.json data/history; then
            echo "No stats changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/setup/sites.yaml data/site-stats.json data/history
          git commit \
            -m "Keep dashboard snapshot current from scheduled collection" \
            -m "Constraint: Scheduled collection must include newly discovered GA4 web streams before stats are generated. Confidence: high Scope-risk: narrow Directive: Keep this commit limited to generated site/stat/history data unless the collection contract changes. Tested: pnpm stats:update; pnpm type-check; pnpm lint; pnpm build Not-tested: Manual review of every metric value."
          git push
