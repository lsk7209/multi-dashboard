name: Update dashboard stats

on:
  schedule:
    # Daily dashboard refresh at 07:00 KST (22:00 UTC on the previous day).
    # If generated data is unchanged, the commit step skips push and no Vercel build is triggered.
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: update-dashboard-stats
  cancel-in-progress: false

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import GA4 web streams
        run: pnpm setup:import-ga4-sites

      - name: Update GA4 and GSC snapshot
        run: pnpm stats:update

      - name: Generate site improvement queue
        run: pnpm improvements:queue

      - name: Validate app
        run: |
          pnpm type-check
          pnpm lint
          pnpm test
          pnpm build

      - name: Prune history older than 90 days
        run: |
          cutoff=$(date -u -d '90 days ago' +%Y-%m-%d)
          for f in data/history/*.json; do
            [ -e "$f" ] || continue
            base=$(basename "$f" .json)
            if [[ "$base" < "$cutoff" ]]; then
              echo "Pruning $f (older than $cutoff)"
              rm -f "$f"
            fi
          done

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- scripts/setup/sites.yaml data/site-stats.json data/history data/site-improvement-queue.json data/site-improvement-issue.md docs/seo-work-queue.md; then
            echo "No stats changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/setup/sites.yaml data/site-stats.json data/history data/site-improvement-queue.json data/site-improvement-issue.md docs/seo-work-queue.md
          git commit \
            -m "Keep dashboard snapshot current from scheduled collection" \
            -m "Constraint: Scheduled collection must include newly discovered GA4 web streams before stats and improvement queues are generated. Confidence: high Scope-risk: narrow Directive: Keep this commit limited to generated site/stat/history/improvement data unless the collection contract changes. Tested: pnpm stats:update; pnpm improvements:queue; pnpm type-check; pnpm lint; pnpm test; pnpm build Not-tested: Manual review of every metric value."
          git push

      - name: Publish improvement queue issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="자동 사이트 개선 큐"
          label="site-improvement-queue"
          gh label create "$label" --color 1D76DB --description "Daily dashboard-driven site improvement queue" 2>/dev/null || true
          existing=$(gh issue list --label "$label" --state open --limit 1 --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --title "$title" --body-file data/site-improvement-issue.md
          else
            gh issue create --title "$title" --label "$label" --body-file data/site-improvement-issue.md
          fi

      - name: Alert on collection failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="수집 실패: update-stats $(date -u +%Y-%m-%d)"
          body="자동 수집 워크플로우가 실패했습니다.\n\n실행 로그: ${RUN_URL}\n\n점검 순서(OPERATIONS.md §4): 결제부터 의심하지 말 것 — Validate(type-check/lint/build) step이 흔한 원인입니다. \`gh run view --log-failed\`로 실패 step을 먼저 확인하세요."
          existing=$(gh issue list --label collection-failure --state open --limit 1 --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$(printf '%b' "$body")"
          else
            gh label create collection-failure --color B60205 --description "Scheduled dashboard collection failed" 2>/dev/null || true
            gh issue create --title "$title" --label collection-failure --body "$(printf '%b' "$body")"
          fi
